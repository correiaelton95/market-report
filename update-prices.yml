name: Weekly Price Update

on:
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday at 6am UTC (2am Houston time)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Needed to commit back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch fresh price data and bake into index.html
        run: node update-prices.js

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Weekly price update $(date -u +%Y-%m-%d)"
          git push
