name: Weekly Price Update

on:
  schedule:
    - cron: '0 6 * * 0'  # Every Sunday 6am UTC (2am Houston)
  workflow_dispatch:       # Manual trigger from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch price data and write prices.json
        run: node update-prices.js

      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet || git commit -m "Weekly prices update $(date -u +%Y-%m-%d)"
          git push
