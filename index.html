<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080c10; --bg2: #0d1117; --bg3: #161b22; --bg4: #1c2330;
  --border: #21262d; --border2: #30363d;
  --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
  --green: #3fb950; --red: #f85149; --yellow: #e3b341;
  --blue: #58a6ff; --blue2: #1f6feb; --purple: #bc8cff;
  --accent: #00d9ff; --accent2: #0096b2;
  --font: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
:root.light {
  --bg: #f6f8fa; --bg2: #ffffff; --bg3: #f0f2f5; --bg4: #e8eaed;
  --border: #d0d7de; --border2: #afb8c1;
  --text: #1f2328; --text2: #656d76; --text3: #9198a1;
  --green: #1a7f37; --red: #d1242f; --yellow: #9a6700;
  --blue: #0969da; --blue2: #0550ae; --purple: #8250df;
  --accent: #0969da; --accent2: #0550ae;
}
html, body, #root { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }
.app { min-height: 100vh; display: flex; flex-direction: column; }
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 100; }
.header-logo { font-size: 14px; font-weight: 800; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }
.header-meta { font-size: 12px; color: var(--text3); }
.header-status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.tabs { background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; padding: 0 28px; overflow-x: auto; }
.tab { padding: 13px 22px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; border: none; background: none; color: var(--text3); border-bottom: 2px solid transparent; transition: all .2s; white-space: nowrap; font-family: var(--font); }
.tab:hover { color: var(--text2); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.main { flex: 1; padding: 28px; max-width: 1400px; margin: 0 auto; width: 100%; }
.gap-20 { display: flex; flex-direction: column; gap: 20px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.card-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 16px; }
.perf { font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 4px; font-family: var(--font-mono); }
.perf.pos { color: var(--green); background: rgba(63,185,80,.12); }
.perf.neg { color: var(--red); background: rgba(248,81,73,.12); }
.perf.neu { color: var(--text2); background: rgba(139,148,158,.1); }
.sent-track { height: 5px; background: var(--bg4); border-radius: 3px; }

.bench-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.bench-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.bench-ticker { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }
.bench-price { font-size: 22px; font-weight: 700; color: var(--text); margin: 8px 0 4px; font-family: var(--font-mono); }
.bench-perf-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
.bench-perf-label { font-size: 11px; color: var(--text3); }
.sector-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 18px; cursor: pointer; transition: border-color .2s, background .2s; }
.sector-card:hover { border-color: var(--border2); background: var(--bg3); }
.sector-card.expanded { border-color: var(--accent2); }
.sector-name { font-size: 14px; font-weight: 700; }
.sector-ticker { font-size: 11px; color: var(--text3); font-family: var(--font-mono); margin-top: 2px; }
.expanded-section { margin-bottom: 12px; }
.expanded-label { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
.expanded-text { font-size: 13px; color: var(--text2); line-height: 1.65; }
.risk-flag { background: rgba(227,179,65,.08); border: 1px solid rgba(227,179,65,.2); border-radius: 5px; padding: 8px 12px; font-size: 12px; color: var(--yellow); }
.sector-divider { height: 1px; background: var(--border); margin: 14px 0; }
.mover-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }

.mover-ticker { font-family: var(--font-mono); font-weight: 600; }
.mover-pct { font-family: var(--font-mono); font-weight: 700; font-size: 13px; }
.heatmap { display: grid; grid-template-columns: repeat(11,1fr); gap: 6px; }
.heatmap-cell { padding: 10px 6px; border-radius: 6px; text-align: center; cursor: default; }
.heatmap-cell-emoji { font-size: 16px; margin-bottom: 4px; }
.heatmap-cell-name { font-size: 10px; font-weight: 700; letter-spacing: 0.3px; margin-bottom: 3px; line-height: 1.2; }
.heatmap-cell-ticker { font-size: 9px; font-family: var(--font-mono); opacity: 0.7; margin-bottom: 4px; }
.heatmap-cell-score { font-size: 12px; font-weight: 800; font-family: var(--font-mono); }
.macro-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
.macro-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.macro-label { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.macro-value { font-size: 22px; color: var(--accent); font-weight: 800; margin-bottom: 6px; font-family: var(--font-mono); }
.macro-note { font-size: 12px; color: var(--text2); line-height: 1.6; }
.rotation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.rotation-col-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
.rotation-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.rotation-item:last-child { border-bottom: none; }
.comm-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.comm-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.comm-spot { font-size: 24px; color: var(--yellow); font-weight: 800; margin: 8px 0 2px; font-family: var(--font-mono); }
.comm-spot-label { font-size: 10px; color: var(--text3); letter-spacing: 1px; font-weight: 600; }
.history-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.hist-btn { padding: 5px 14px; border-radius: 5px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font); transition: all .2s; }
.hist-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.chart-wrap { position: relative; height: 200px; margin-top: 8px; }
.progress-wrap { padding: 70px 28px; text-align: center; }
.progress-title { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase; }
.progress-sub { font-size: 13px; color: var(--text2); margin-bottom: 36px; }
.progress-track { background: var(--bg3); border-radius: 3px; height: 4px; overflow: hidden; margin-bottom: 10px; max-width: 500px; margin-left: auto; margin-right: auto; }
.progress-fill { height: 100%; background: var(--accent); transition: width .4s; }
.progress-ticker { font-size: 12px; color: var(--text3); margin-bottom: 24px; font-family: var(--font-mono); }
.progress-log { max-width: 420px; margin: 0 auto; text-align: left; }
.progress-item { display: flex; align-items: center; gap: 10px; font-size: 12px; margin-bottom: 7px; }
.progress-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.settings-wrap { max-width: 580px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
.setting-group { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 22px; }
.setting-label { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
.setting-desc { font-size: 12px; color: var(--text2); margin-bottom: 14px; line-height: 1.65; }
.setting-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 5px; padding: 10px 14px; color: var(--text); font-family: var(--font-mono); font-size: 13px; outline: none; transition: border-color .2s; }
.setting-input:focus { border-color: var(--accent); }
.btn { padding: 8px 18px; border-radius: 5px; font-family: var(--font); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; cursor: pointer; border: none; transition: all .2s; text-transform: uppercase; }
.btn-primary { background: var(--accent); color: var(--bg); }
.btn-primary:hover { background: #00b8d9; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { border-color: var(--text2); color: var(--text); }
.btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(248,81,73,.3); }
.btn-danger:hover { background: rgba(248,81,73,.1); }
.btn-generate { background: linear-gradient(135deg, var(--accent), var(--blue2)); color: white; font-weight: 800; font-size: 15px; padding: 16px 44px; border-radius: 8px; letter-spacing: 1.5px; border: none; cursor: pointer; font-family: var(--font); text-transform: uppercase; box-shadow: 0 0 32px rgba(0,217,255,.2); transition: all .2s; }
.btn-generate:hover { box-shadow: 0 0 48px rgba(0,217,255,.35); transform: translateY(-1px); }
.btn-generate:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.welcome { text-align: center; padding: 90px 28px; }
.welcome-title { font-size: 38px; font-weight: 800; color: var(--accent); letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; }
.welcome-sub { font-size: 14px; color: var(--text2); margin-bottom: 52px; }
.welcome-features { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; max-width: 740px; margin: 0 auto 52px; }
.welcome-feat { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 18px; text-align: left; }
.welcome-feat-icon { font-size: 22px; margin-bottom: 10px; }
.welcome-feat-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
.welcome-feat-desc { font-size: 11px; color: var(--text3); line-height: 1.6; }
.sort-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.sort-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
.sort-btn { padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font); transition: all .2s; }
.sort-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.empty { text-align: center; padding: 40px; color: var(--text3); font-size: 13px; }
.chart-tab { display: flex; flex-direction: column; gap: 20px; }
.chart-main-wrap { position: relative; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.chart-canvas-wrap { position: relative; height: 460px; cursor: crosshair; }
.chart-toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; }
.chart-toolbar-group { display: flex; gap: 4px; align-items: center; }
.chart-toolbar-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; white-space: nowrap; }
.chart-tb-btn { padding: 4px 12px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font); transition: all .15s; white-space: nowrap; }
.chart-tb-btn:hover { border-color: var(--text2); color: var(--text); }
.chart-tb-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.chart-tb-btn.mode-rel.active { background: var(--purple); border-color: var(--purple); color: #000; }
.chart-separator { width: 1px; height: 20px; background: var(--border2); margin: 0 4px; }
.asset-toggles { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
.asset-group-title { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.asset-group { margin-bottom: 16px; }
.asset-group:last-child { margin-bottom: 0; }
.asset-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.asset-chip { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; transition: all .15s; font-family: var(--font); }
.asset-chip.off { background: var(--bg3); border-color: var(--border); color: var(--text3); }
.asset-chip.off:hover { border-color: var(--border2); color: var(--text2); }
.asset-chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.range-sidebar { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
.range-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.range-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.range-row:last-child { border-bottom: none; }
.range-ticker { font-family: var(--font-mono); font-weight: 600; }
.corr-matrix { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 18px; overflow-x: auto; }
.corr-table { border-collapse: collapse; font-size: 11px; min-width: 100%; }
.corr-table th { padding: 6px 10px; font-weight: 700; color: var(--text3); font-size: 10px; text-align: center; white-space: nowrap; }
.corr-table td { padding: 5px 10px; text-align: center; font-family: var(--font-mono); font-size: 11px; border: 1px solid var(--border); }
.chart-fetch-status { text-align: center; padding: 60px 20px; }
.chart-fetch-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.chart-fetch-sub { font-size: 13px; color: var(--text2); margin-bottom: 28px; line-height: 1.6; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
@media (max-width: 1000px) {
  .grid-4 { grid-template-columns: 1fr 1fr; }
  .heatmap { grid-template-columns: repeat(4,1fr); }
  .welcome-features { grid-template-columns: 1fr 1fr; }
  .macro-grid { grid-template-columns: 1fr; }
  .rotation-grid { grid-template-columns: 1fr; }
  .grid-3 { grid-template-columns: 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
}

</style>
</head>

  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Inter,sans-serif;gap:16px">

<script>
window.onerror = function(msg, src, line) {
  var root = document.getElementById('root');
  if(root) root.innerHTML = '<div style="padding:40px;font-family:monospace;color:#f85149;background:#0d1117;min-height:100vh"><h2 style="margin-bottom:16px">Startup Error</h2><pre style="font-size:12px;white-space:pre-wrap;color:#e6edf3;background:#161b22;padding:16px;border-radius:4px">' + String(msg) + '\n\nLine: ' + line + '</pre></div>';
};
</script>

<script id="app-source" type="text/x-app-source">
var React = window.React;
var ReactDOM = window.ReactDOM;
var Chart = window.Chart;
const { useState, useEffect, useCallback, useRef } = React;

const SECTORS = [
  { id:"XLK", name:"Technology", emoji:"⚡" },
  { id:"XLV", name:"Healthcare", emoji:"🧬" },
  { id:"XLF", name:"Financials", emoji:"🏦" },
  { id:"XLE", name:"Energy", emoji:"🛢️" },
  { id:"XLY", name:"Cons. Discr.", emoji:"🛍️" },
  { id:"XLP", name:"Cons. Staples", emoji:"🛒" },
  { id:"XLI", name:"Industrials", emoji:"⚙️" },
  { id:"XLB", name:"Materials", emoji:"⛏️" },
  { id:"XLRE", name:"Real Estate", emoji:"🏢" },
  { id:"XLU", name:"Utilities", emoji:"💡" },
  { id:"XLC", name:"Comm. Svcs", emoji:"📡" },
];
const BENCHMARKS = [
  { id:"SPY", name:"S&P 500" },
  { id:"QQQ", name:"Nasdaq 100" },
  { id:"DIA", name:"Dow Jones" },
  { id:"IWM", name:"Russell 2000" },
];
const GLOBAL = [
  { id:"VEU", name:"World ex-US" },
  { id:"EEM", name:"Emerging Mkts" },
  { id:"VGK", name:"Europe" },
  { id:"VPL", name:"Asia Pacific" },
];
const COMMODITIES = [
  { id:"GLD", name:"Gold ETF" },
  { id:"SLV", name:"Silver" },
  { id:"USO", name:"Oil ETF" },
  { id:"COPA", name:"Copper" },
  { id:"DJP", name:"Broad Commodities" },
];
const ALL_TICKERS = [...SECTORS.map(s=>s.id),...BENCHMARKS.map(b=>b.id),...GLOBAL.map(g=>g.id),...COMMODITIES.map(c=>c.id)];

const CACHE_KEY="mkt_v4_cache", HISTORY_KEY="mkt_v4_history", SETTINGS_KEY="mkt_v4_settings", PARTIAL_KEY="mkt_v4_partial", AI_EVENTS_KEY="mkt_v4_ai_events";
const CACHE_TTL = 7*24*60*60*1000;
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
const GROQ_MODEL = "llama-3.3-70b-versatile";
const RATE_LIMIT_WAIT = 65000;

// ── Storage ───────────────────────────────────────────────────────────────────
const store = {
  get: k => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} },
  del: k => { try { localStorage.removeItem(k); } catch {} },
};
const loadCache = () => { const d=store.get(CACHE_KEY); if(!d) return null; if(Date.now()-d.timestamp>CACHE_TTL) return null; return d; };
const loadSettings = () => store.get(SETTINGS_KEY)||{};
const loadHistory = () => store.get(HISTORY_KEY)||[];

// ── Helpers ───────────────────────────────────────────────────────────────────
const pc = v => (v==null||isNaN(v))?"neu":v>0?"pos":v<0?"neg":"neu";
const fp = v => (v==null||isNaN(v))?"N/A":(v>0?"+":"")+v.toFixed(2)+"%";
const sentColor = s => s>=1.5?"#3fb950":s>=0.5?"#56d364":s>-0.5?"#e3b341":s>-1.5?"#f0883e":"#f85149";
const sentLabel = s => s>=1.5?"BULLISH":s>=0.5?"LEAN BULL":s>-0.5?"NEUTRAL":s>-1.5?"LEAN BEAR":"BEARISH";
const mom = m => m==="up"?"↑":m==="down"?"↓":"→";
const heatColor = s => s>=1.5?{bg:"rgba(63,185,80,.2)",col:"#3fb950"}:s>=0.5?{bg:"rgba(86,211,100,.13)",col:"#56d364"}:s>-0.5?{bg:"rgba(227,179,65,.13)",col:"#e3b341"}:s>-1.5?{bg:"rgba(240,136,62,.13)",col:"#f0883e"}:{bg:"rgba(248,81,73,.18)",col:"#f85149"};

// ── Price Data (via Netlify proxy → Yahoo Finance, or baked) ─────────────────

// Stooq.com — free, no API key, no CORS issues, full history
// Used by pandas-datareader, no registration needed
const STOOQ_MAP = {"VIX": "%5EVIX"}; // Yahoo uses ^VIX encoded as %5EVIX, all others use ticker directly

async function fetchStooq(ticker) {
  const sym = STOOQ_MAP[ticker] || ticker; // Yahoo uses standard tickers
  // Call our own Netlify proxy function — no CORS issues
  const url = `/.netlify/functions/proxy?ticker=${encodeURIComponent(sym)}`;
  const r = await fetch(url, { signal: AbortSignal.timeout(20000) });
  if(!r.ok) throw new Error(`Proxy HTTP ${r.status} for ${ticker}`);
  const text = await r.text();
  if(text.includes("No data") || text.includes("error") || text.trim().split("\n").length < 3) {
    throw new Error("No data for "+ticker);
  }
  // Parse CSV: date,close
  const lines = text.trim().split("\n").slice(1); // skip header
  const pairs = lines.map(line => {
    const cols = line.split(",");
    return { date: cols[0].trim(), close: parseFloat(cols[1]) };
  }).filter(p => p.date && !isNaN(p.close));
  if(pairs.length === 0) throw new Error("Empty data for "+ticker);
  return pairs; // sorted oldest→newest
}

async function fetchTicker(ticker, _key, onWait) {
  const pairs = await fetchStooq(ticker);
  const latest = pairs[pairs.length-1].close;
  const perf = n => {
    const idx = Math.max(0, pairs.length-1-n);
    const old = pairs[idx].close;
    if(!old) return null;
    return ((latest-old)/old)*100;
  };
  return {
    ticker, price:latest,
    w1:perf(5), m1:perf(21), m3:perf(63), m6:perf(126), y1:perf(252)
  };
}

// ── Math-based sentiment score (anchored to real price data) ─────────────────
function calcMathScore(perf) {
  if(!perf) return 0;
  // Normalize each period to -2..+2 scale
  const norm = v => {
    if(v == null || isNaN(v)) return 0;
    if(v >= 5) return 2;
    if(v >= 2) return 1;
    if(v >= -2) return 0;
    if(v >= -5) return -1;
    return -2;
  };
  // Weighted: 1W=20%, 1M=35%, 3M=45%
  const score = norm(perf.w1)*0.20 + norm(perf.m1)*0.35 + norm(perf.m3)*0.45;
  return Math.round(score * 4) / 4; // round to nearest 0.25
}

function clampScore(s) { return Math.max(-2, Math.min(2, Math.round(s*4)/4)); }


// ── Derive ETF performance from baked chart prices ────────────────────────────
function derivePerfFromBaked(hardcodedPrices) {
  if(!hardcodedPrices || !hardcodedPrices._dates) return {};
  const dates = hardcodedPrices._dates;
  const perfData = {};
  const allTickers = [...SECTORS.map(s=>s.id), ...BENCHMARKS.map(b=>b.id),
                      ...GLOBAL.map(g=>g.id), ...COMMODITIES.map(c=>c.id)];
  allTickers.forEach(ticker => {
    const prices = hardcodedPrices[ticker];
    if(!prices || prices.length === 0) return;
    // Find last non-null price
    let latestIdx = prices.length - 1;
    while(latestIdx > 0 && prices[latestIdx] === null) latestIdx--;
    const latest = prices[latestIdx];
    if(!latest) return;
    const perf = n => {
      const idx = Math.max(0, latestIdx - n);
      const old = prices[idx];
      if(!old) return null;
      return ((latest - old) / old) * 100;
    };
    perfData[ticker] = {
      ticker, price: latest,
      w1: perf(5), m1: perf(21), m3: perf(63), m6: perf(126), y1: perf(252)
    };
  });
  return perfData;
}

// ── Groq ──────────────────────────────────────────────────────────────────────
async function groq(apiKey, prompt, onWait) {
  for(let attempt=0; attempt<4; attempt++) {
    const r = await fetch(GROQ_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
      body:JSON.stringify({ model:GROQ_MODEL, messages:[{role:"user",content:prompt}], temperature:0.4, max_tokens:1200 })
    });
    const j = await r.json();
    if(j.error) {
      const msg = j.error.message||"";
      const waitMatch = msg.match(/try again in ([d.]+)s/);
      const waitSec = waitMatch ? Math.ceil(parseFloat(waitMatch[1]))+2 : 15;
      if(msg.includes("rate_limit")||msg.includes("Rate limit")||msg.includes("TPM")||msg.includes("tokens per minute")) {
        if(attempt<3) { onWait&&onWait(`Groq rate limit — waiting ${waitSec}s...`); await new Promise(res=>setTimeout(res,waitSec*1000)); continue; }
      }
      throw new Error(msg);
    }
    return j.choices?.[0]?.message?.content||"";
  }
}

{"score":<float, must be between ${clampScore(mathScore-0.5)} and ${clampScore(mathScore+0.5)}>,"momentum":<"up"|"down"|"flat">,"scoreAdjustReason":"<why you adjusted from ${mathScore}, or 'none' if kept>","pulse":"<4-5 specific sentences referencing real recent events and company names>","subindustry":"<1-2 sentences on most interesting sub-sector with specific names>","earnings":"<specific companies reporting THIS week with tickers, or 'No major earnings this week'>","georisk":<null or "<specific current geopolitical risk affecting this sector>">,"topMovers":[{"ticker":"<real ticker>","pct":<number>,"dir":"up"},{"ticker":"<real ticker>","pct":<number>,"dir":"up"},{"ticker":"<real ticker>","pct":<number>,"dir":"up"},{"ticker":"<real ticker>","pct":<number>,"dir":"down"},{"ticker":"<real ticker>","pct":<number>,"dir":"down"},{"ticker":"<real ticker>","pct":<number>,"dir":"down"}],"outlook":"<2 sentences: near-term catalyst and 12-24 month structural view>"}`

function LineChartCanvas({ data, color="#00d9ff", yDomain, unit="" }) {
  const ref = useRef(null), chartRef = useRef(null);
  useEffect(() => {
    if(!ref.current||!data||data.length<2) return;
    if(chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext("2d");
    const min = yDomain?yDomain[0]:Math.min(...data.map(d=>d.value))*1.1;
    const max = yDomain?yDomain[1]:Math.max(...data.map(d=>d.value))*1.1;
    chartRef.current = new Chart(ctx, {
      type:"line",
      data:{ labels:data.map(d=>d.label), datasets:[{ data:data.map(d=>d.value), borderColor:color, backgroundColor:color+"18", borderWidth:2, pointRadius:3, pointBackgroundColor:color, fill:true, tension:0.3 }] },
      options:{ responsive:true, maintainAspectRatio:false, animation:false,
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: c=>(c.raw+(unit||"")) } } },
        scales:{ x:{ ticks:{color:"#484f58",font:{size:10,family:"Inter"}}, grid:{color:"#21262d"} }, y:{ min, max, ticks:{color:"#484f58",font:{size:10,family:"Inter"}}, grid:{color:"#21262d"} } }
      }
    });
    return () => { if(chartRef.current) chartRef.current.destroy(); };
  }, [data,color]);
  if(!data||data.length<2) return <div className="empty" style={{padding:20}}>Generate at least 2 reports to see trend lines.</div>;
  return <div className="chart-wrap"><canvas ref={ref}/></div>;
}

// ── Normalize prices to % return from period start ────────────────────────────
function normalizeSeries(dates, prices, windowDays, relTicker=null, allPrices={}) {
  if(!prices||prices.length===0) return [];
  const n = Math.min(windowDays, prices.length);
  const slice = prices.slice(prices.length - n);
  const base = slice[0];
  if(!base) return [];
  if(relTicker && allPrices[relTicker]) {
    const relPrices = allPrices[relTicker];
    const relSlice = relPrices.slice(relPrices.length - n);
    const relBase = relSlice[0];
    return slice.map((p,i) => {
      const absReturn = ((p - base) / base) * 100;
      const relReturn = relSlice[i] ? (((relSlice[i] - relBase) / relBase) * 100) : 0;
      return parseFloat((absReturn - relReturn).toFixed(3));
    });
  }
  return slice.map(p => parseFloat((((p - base) / base) * 100).toFixed(3)));
}

function getDateSlice(allDates, windowDays) {
  const n = Math.min(windowDays, allDates.length);
  return allDates.slice(allDates.length - n);
}

// ── Correlation calculation ───────────────────────────────────────────────────
function pearsonCorr(a, b) {
  const n = Math.min(a.length, b.length);
  if(n < 5) return null;
  const ax = a.slice(a.length-n), bx = b.slice(b.length-n);
  const ma = ax.reduce((s,v)=>s+v,0)/n, mb = bx.reduce((s,v)=>s+v,0)/n;
  let num=0, da=0, db=0;
  for(let i=0;i<n;i++) { num+=(ax[i]-ma)*(bx[i]-mb); da+=(ax[i]-ma)**2; db+=(bx[i]-mb)**2; }
  const denom = Math.sqrt(da*db);
  return denom===0 ? null : parseFloat((num/denom).toFixed(2));
}

function corrColor(v) {
  if(v===null) return "var(--bg4)";
  const abs = Math.abs(v);
  if(v>0.7) return "rgba(63,185,80,0.3)";
  if(v>0.3) return "rgba(63,185,80,0.15)";
  if(v>-0.3) return "rgba(139,148,158,0.1)";
  if(v>-0.7) return "rgba(248,81,73,0.15)";
  return "rgba(248,81,73,0.3)";
}


// ── Bull / Bear regime (20% rule) ────────────────────────────────────────────
function calcRegime(prices) {
  // Returns array of "bull" | "bear" for each price index
  if(!prices || prices.length === 0) return [];
  const regime = new Array(prices.length).fill("bull");
  let peak = prices[0], trough = prices[0];
  let inBear = false;

  for(let i = 1; i < prices.length; i++) {
    const p = prices[i];
    if(p === null) { regime[i] = regime[i-1]; continue; }

    if(!inBear) {
      if(p > peak) peak = p;
      // Enter bear if down 20% from peak
      if((p - peak) / peak <= -0.20) {
        inBear = true;
        trough = p;
        // Mark back to where peak was (retroactive)
        regime[i] = "bear";
      } else {
        regime[i] = "bull";
      }
    } else {
      if(p < trough) trough = p;
      // Exit bear if up 20% from trough
      if((p - trough) / trough >= 0.20) {
        inBear = false;
        peak = p;
        regime[i] = "bull";
      } else {
        regime[i] = "bear";
      }
    }
  }
  return regime;
}

function getRegimeSlice(prices, windowDays) {
  const fullRegime = calcRegime(prices);
  return fullRegime.slice(fullRegime.length - Math.min(windowDays, fullRegime.length));
}

// Build Chart.js background color plugin data for SPY regime
function buildSpyBackgroundPlugin(spyRegime) {
  if(!spyRegime || spyRegime.length === 0) return null;
  // Returns a custom plugin that draws background bands
  return {
    id: "spyBackground",
    beforeDraw(chart) {
      const { ctx, chartArea: { top, bottom, left, right }, scales: { x } } = chart;
      if(!x) return;
      ctx.save();
      let segStart = 0, curRegime = spyRegime[0];
      const drawBand = (start, end, regime) => {
        if(start >= end) return;
        const x1 = x.getPixelForValue(start);
        const x2 = x.getPixelForValue(end);
        ctx.fillStyle = regime === "bull" ? "rgba(63,185,80,0.04)" : "rgba(248,81,73,0.07)";
        ctx.fillRect(Math.min(x1,x2), top, Math.abs(x2-x1), bottom-top);
      };
      for(let i = 1; i < spyRegime.length; i++) {
        if(spyRegime[i] !== curRegime) {
          drawBand(segStart, i-1, curRegime);
          segStart = i-1;
          curRegime = spyRegime[i];
        }
      }
      drawBand(segStart, spyRegime.length-1, curRegime);
      ctx.restore();
    }
  };
}

// For each asset line: split into segments colored by regime
function buildSegmentedDataset(ticker, normalizedData, assetRegime, baseColor) {
  if(!assetRegime || assetRegime.length === 0) {
    return { borderColor: baseColor, segment: undefined };
  }
  return {
    borderColor: baseColor,
    segment: {
      borderColor: ctx => {
        const idx = ctx.p0DataIndex;
        const regime = assetRegime[idx];
        if(regime === "bear") return "#c9484488"; // desaturated red-orange
        return baseColor;
      }
    }
  };
}


// ── Fetch from FRED (no key required) ────────────────────────────────────────
async function fetchFRED(seriesId) {
  const url = `https://fred.stlouisfed.org/graph/fredgraph.csv?id=${seriesId}`;
  const r = await fetch(url);
  const text = await r.text();
  const lines = text.trim().split("\n").slice(1);
  const dates = [], values = [];
  lines.forEach(line => {
    const [date, val] = line.split(",");
    if(date && val && val.trim() !== ".") {
      dates.push(date.trim());
      values.push(parseFloat(val.trim()));
    }
  });
  return { dates, values };
}
