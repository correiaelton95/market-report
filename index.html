  const results = {};
  try {
    // CPI YoY % change (CPIAUCSL — monthly)
    const cpi = await fetchFRED("CPIAUCSL");
    if(cpi.values.length >= 13) {
      const latest = cpi.values[cpi.values.length-1];
      const yearAgo = cpi.values[cpi.values.length-13];
      const yoy = ((latest - yearAgo) / yearAgo * 100).toFixed(1);
      const prev = cpi.values[cpi.values.length-2];
      const prevYearAgo = cpi.values[cpi.values.length-14];
      const prevYoy = ((prev - prevYearAgo) / prevYearAgo * 100).toFixed(1);
      const trend = parseFloat(yoy) < parseFloat(prevYoy) ? "↓ cooling" : "↑ rising";
      results.cpi = `${yoy}% YoY`;
      results.cpiDate = cpi.dates[cpi.dates.length-1];
      results.cpiTrend = trend;
      results.cpiPrev = `${prevYoy}%`;
    }
  } catch(e) { console.warn("CPI fetch failed:", e.message); }

  try {
    // Fed Funds Rate (FEDFUNDS — monthly effective rate)
    const fed = await fetchFRED("FEDFUNDS");
    if(fed.values.length > 0) {
      const latest = fed.values[fed.values.length-1].toFixed(2);
      results.fedRate = `${latest}%`;
      results.fedDate = fed.dates[fed.dates.length-1];
    }
  } catch(e) { console.warn("Fed rate fetch failed:", e.message); }

  try {
    // Real GDP Growth QoQ annualized (A191RL1Q225SBEA — quarterly)
    const gdp = await fetchFRED("A191RL1Q225SBEA");
    if(gdp.values.length > 0) {
      const latest = gdp.values[gdp.values.length-1].toFixed(1);
      const prev = gdp.values[gdp.values.length-2].toFixed(1);
      results.gdp = `${latest}% (annualized)`;
      results.gdpDate = gdp.dates[gdp.dates.length-1];
      results.gdpPrev = prev;
    }
  } catch(e) { console.warn("GDP fetch failed:", e.message); }

  return results;
}




// ── ChartTab component ────────────────────────────────────────────────────────
function ChartTab({ settings, hardcodedPrices, onBakeData, chartNeedsUpdate, onDownload, aiEvents=[], pricesDate=null }) {
  const [priceData, setPriceData] = useState(hardcodedPrices||{});
  const [dates, setDates] = useState(hardcodedPrices?._dates||[]);
  const [fetching, setFetching] = useState(false);
  const [fetchLog, setFetchLog] = useState([]);
  const [fetchProgress, setFetchProgress] = useState(0);
  const [activeAssets, setActiveAssets] = useState(["SPY"]);
  const [window_, setWindow_] = useState("5Y");
  const [mode, setMode] = useState("abs"); // abs | rel
  const [events, setEvents] = useState("major"); // off | major | all
  const [rangeResult, setRangeResult] = useState(null);
  const [bakeReady, setBakeReady] = useState(false);
  const [visibleEventsForPanel, setVisibleEventsForPanel] = useState([]);
  // aiEvents comes from parent App via prop — auto-updates when weekly report runs
  const chartRef = useRef(null);
  const chartInstanceRef = useRef(null);
  const isDragging = useRef(false);
  const dragStart = useRef(null);

  const hasData = dates.length > 0 && Object.keys(priceData).length > 0;

  // ── Fetch historical data ──────────────────────────────────────────────────
  const fetchAll = useCallback(async() => {
    // Price data fetched via Netlify proxy — no key needed
    setFetching(true);
    setFetchLog([]);
    const tick = msg => setFetchLog(l=>[...l.slice(-8),msg]);
    const allTickers = ALL_ASSETS.flatMap(g=>g.tickers);
    const newPrices = {};
    let sharedDates = null;

    for(let i=0; i<allTickers.length; i++) {
      const t = allTickers[i];
      tick(`Fetching ${t} (${i+1}/${allTickers.length})...`);
      setFetchProgress(Math.round((i/allTickers.length)*100));
      try {
        const pairs = await fetchStooq(t);
        const d = pairs.map(p=>p.date);
        const prices = pairs.map(p=>p.close);
        if(!sharedDates || d.length > sharedDates.length) sharedDates = d;
        newPrices[t] = prices;
        newPrices[t+"_dates"] = d;
        tick(`✓ ${t} — ${pairs.length} days`);
      } catch(e) {
        tick(`⚠ ${t}: ${e.message}`);
      }
      if(i < allTickers.length-1) await new Promise(r=>setTimeout(r,800));
    }

    // Align all series to common dates using SPY as master
    const masterDates = newPrices["SPY_dates"] || sharedDates || [];
    const aligned = {};
    for(const t of allTickers) {
      if(!newPrices[t]) continue;
      const tDates = newPrices[t+"_dates"]||[];
      const dateMap = {};
      tDates.forEach((d,i) => { dateMap[d] = newPrices[t][i]; });
      aligned[t] = masterDates.map(d => dateMap[d]??null);
    }
    aligned._dates = masterDates;

    // Fetch VIX from Yahoo Finance
    tick("Fetching VIX (Fear Index)...");
    await new Promise(r=>setTimeout(r,1500));
    try {
      const vixPairs = await fetchStooq("VIX");
      const vResult = { timestamp: vixPairs.map(p=>new Date(p.date).getTime()/1000), indicators:{quote:[{close:vixPairs.map(p=>p.close)}]} };
      if(vResult) {
        const vPairs = vResult.timestamp.map((ts,i)=>({
          date: new Date(ts*1000).toISOString().split("T")[0],
          close: vResult.indicators.quote[0].close[i]
        })).filter(p=>p.close!==null&&p.close!==undefined);
        const vDateMap = {};
        vPairs.forEach(p => { vDateMap[p.date] = p.close; });
        aligned["VIX"] = masterDates.map(d => vDateMap[d]??null);
        tick("VIX fetched ✓");
      }
    } catch(e) { tick("⚠ VIX: "+e.message); }

    // Fetch UMCSENT from FRED (free, no key)
    tick("Fetching Consumer Sentiment (FRED)...");
    try {
      const fred = await fetchFRED("UMCSENT");
      if(fred.dates.length > 0) {
        // UMCSENT is monthly — forward-fill to all master dates
        // Sort fred dates ascending
        const fredSorted = fred.dates.map((d,i)=>({date:d,val:fred.values[i]})).sort((a,b)=>a.date.localeCompare(b.date));
        let lastVal = null;
        let fredIdx = 0;
        aligned["UMCSENT"] = masterDates.map(d => {
          // Advance fred pointer to include all monthly values up to this date
          while(fredIdx < fredSorted.length && fredSorted[fredIdx].date <= d) {
            lastVal = fredSorted[fredIdx].val;
            fredIdx++;
          }
          return lastVal; // forward-fill with last known monthly value
        });
        const nonNull = aligned["UMCSENT"].filter(v=>v!==null).length;
        tick(`Consumer Sentiment fetched ✓ (${nonNull} data points)`);
      }
    } catch(e) { tick("⚠ UMCSENT: "+e.message); }

    setPriceData(aligned);
    setDates(masterDates);
    setBakeReady(true);
    onBakeData(aligned);
    setFetching(false);
    setFetchProgress(100);
    tick("✓ All done! Click Download Updated App to bake data.");
  }, [settings.avKey, onBakeData]);

  // ── Build chart ───────────────────────────────────────────────────────────
  useEffect(() => {
    if(!hasData || !chartRef.current) return;
    if(chartInstanceRef.current) chartInstanceRef.current.destroy();

    const windowDays = WINDOW_DAYS[window_];
    const slicedDates = getDateSlice(dates, windowDays);
    const relTicker = mode==="rel" ? "SPY" : null;

    // Bull/bear: SPY regime for background
    const spyPrices = priceData["SPY"];
    const spyRegimeSlice = spyPrices ? getRegimeSlice(spyPrices, windowDays) : null;
    const spyBgPlugin = spyRegimeSlice ? buildSpyBackgroundPlugin(spyRegimeSlice) : null;

    // Separate indicators from price assets
    const priceAssets = activeAssets.filter(t => !INDICATORS.includes(t));
    const activeIndicators = activeAssets.filter(t => INDICATORS.includes(t));
    const hasVIX = activeIndicators.includes("VIX");
    const hasUMCSENT = activeIndicators.includes("UMCSENT");

    // Build price asset datasets with per-asset regime coloring
    const priceDatasets = priceAssets.map(ticker => {
      const prices = priceData[ticker];
      if(!prices) return null;
      const normalized = normalizeSeries(dates, prices, windowDays, relTicker, priceData);
      const assetRegime = getRegimeSlice(prices, windowDays);
      const baseColor = ASSET_COLORS[ticker]||"#ffffff";
      const segmented = buildSegmentedDataset(ticker, normalized, assetRegime, baseColor);
      return {
        label: ticker,
        data: normalized,
        backgroundColor: "transparent",
        borderWidth: ticker==="SPY" ? 2.5 : 1.8,
        pointRadius: 0,
        pointHoverRadius: 4,
        tension: 0.1,
        yAxisID: "y",
        ...segmented,
      };
    }).filter(Boolean);

    // Build indicator datasets (raw values, right axes)
    const indicatorDatasets = activeIndicators.map(ticker => {
      const rawPrices = priceData[ticker];
      if(!rawPrices) return null;
      const n = Math.min(windowDays, rawPrices.length);
      const sliced = rawPrices.slice(rawPrices.length - n).map(v => v===null?null:parseFloat(v.toFixed(2)));
      const scale = INDICATOR_SCALES[ticker];
      return {
        label: scale.label,
        data: sliced,
        borderColor: ASSET_COLORS[ticker],
        backgroundColor: ASSET_COLORS[ticker]+"18",
        borderWidth: 1.8,
        borderDash: [6,3],
        pointRadius: 0,
        pointHoverRadius: 4,
        tension: 0.3,
        yAxisID: scale.yAxisID,
        fill: ticker==="VIX" ? false : false,
      };
    }).filter(Boolean);

    const datasets = [...priceDatasets, ...indicatorDatasets];

    // Event annotations: only vertical lines (no labels) to avoid overlap
    // Full event details are shown in the panel below the chart
    const hardcodedList = events==="all" ? MARKET_EVENTS_ALL : events==="major" ? MARKET_EVENTS_ALL.filter(e=>MARKET_EVENTS_MAJOR_FILTER.includes(e.label)) : [];
    const aiFiltered = events!=="off" ? aiEvents.filter(e => events==="major" ? e.tier==="major" : true) : [];
    const eventList = [...hardcodedList, ...aiFiltered].filter((ev,i,arr)=>
      arr.findIndex(e=>e.date===ev.date&&e.label===ev.label)===i
    ).sort((a,b)=>a.date.localeCompare(b.date));

    // Filter to events within visible window
    const visibleEvents = eventList.filter(ev => {
      const nearest = slicedDates.findIndex(d=>d>=ev.date);
      return nearest !== -1;
    });

    const annotations = {};
    visibleEvents.forEach((ev,i) => {
      const nearest = slicedDates.findIndex(d=>d>=ev.date);
      if(nearest===-1) return;
      annotations["ev"+i] = {
        type:"line", xMin:nearest, xMax:nearest,
        borderColor:ev.color+"99", borderWidth:1.5,
        borderDash:[4,3],
        label:{
          display:false, // shown on hover via enter/leave events
          content: ev.label,
          position:"start",
          color:ev.color,
          font:{size:10,family:"Inter",weight:"700"},
          backgroundColor:"rgba(13,17,23,0.92)",
          borderColor:ev.color,
          borderWidth:1,
          borderRadius:4,
          padding:{x:8,y:4},
        },
        enter: ({element}) => { element.label.options.display=true; chartInstanceRef.current?.update("none"); },
        leave: ({element}) => { element.label.options.display=false; chartInstanceRef.current?.update("none"); },
      };
    });

    const plugins = [spyBgPlugin].filter(Boolean);
    const ctx = chartRef.current.getContext("2d");
    chartInstanceRef.current = new Chart(ctx, {
      type:"line",
      data:{ labels:slicedDates, datasets },
      plugins,
      options:{
        responsive:true, maintainAspectRatio:false, animation:false,
        interaction:{ mode:"index", intersect:false },
        plugins:{
          legend:{ display:false },
          tooltip:{
            backgroundColor:"rgba(13,17,23,0.95)", borderColor:"#30363d", borderWidth:1,
            titleColor:"#8b949e", bodyColor:"#e6edf3", titleFont:{size:11,family:"JetBrains Mono"},
            bodyFont:{size:12,family:"JetBrains Mono"}, padding:10,
            callbacks:{
              title: items => {
                const d = slicedDates[items[0].dataIndex];
                const regime = spyRegimeSlice?.[items[0].dataIndex];
                return d + (regime ? (regime==="bear"?" 🔴 Bear":" 🟢 Bull") : "");
              },
              label: item => {
                const isInd = item.dataset.yAxisID && item.dataset.yAxisID !== "y";
                if(isInd) return ` ${item.dataset.label}: ${item.raw?.toFixed(1)}`;
                return ` ${item.dataset.label}: ${item.raw>0?"+":""}${item.raw?.toFixed(2)}%`;
              }
            }
          },
          annotation: events!=="off" ? { annotations } : {},
          spyBackground: spyBgPlugin ? {} : undefined,
        },
        scales:{
          x:{ ticks:{ color:"#484f58", font:{size:10,family:"Inter"}, maxTicksLimit:12, maxRotation:0 }, grid:{ color:"#21262d" } },
          y:{ ticks:{ color:"#484f58", font:{size:10,family:"JetBrains Mono"}, callback:v=>(v>0?"+":"")+v.toFixed(1)+"%" }, grid:{ color:"#21262d" },
              title:{ display:true, text: mode==="rel"?"% vs SPY":"% Return", color:"#484f58", font:{size:10} },
              display: priceAssets.length > 0 },
          yRight:{ type:"linear", position:"right", display: hasVIX,
              min:0, max:90,
              ticks:{ color:"#ff4d4d", font:{size:10,family:"JetBrains Mono"}, callback:v=>v.toFixed(0) },
              grid:{ drawOnChartArea:false },
              title:{ display:true, text:"VIX", color:"#ff4d4d", font:{size:10} } },
          yRight2:{ type:"linear", position:"right", display: hasUMCSENT,
              min:40, max:120,
              ticks:{ color:"#bc8cff", font:{size:10,family:"JetBrains Mono"}, callback:v=>v.toFixed(0) },
              grid:{ drawOnChartArea:false },
              title:{ display:true, text:"Consumer Sentiment", color:"#bc8cff", font:{size:10} } },
        }
      }
    });
    // Store visible events for the panel below chart
    setVisibleEventsForPanel(visibleEvents);
    return () => { if(chartInstanceRef.current) chartInstanceRef.current.destroy(); };
  }, [hasData, activeAssets, window_, mode, events, priceData, dates, aiEvents]);

  // ── Drag to select range ───────────────────────────────────────────────────
  const handleMouseDown = useCallback(e => {
    if(!chartInstanceRef.current) return;
    const rect = chartRef.current.getBoundingClientRect();
    dragStart.current = e.clientX - rect.left;
    isDragging.current = true;
    setRangeResult(null);
  }, []);

  const handleMouseUp = useCallback(e => {
    if(!isDragging.current || !chartInstanceRef.current) return;
    isDragging.current = false;
    const chart = chartInstanceRef.current;
    const rect = chartRef.current.getBoundingClientRect();
    const endX = e.clientX - rect.left;
    const startX = dragStart.current;
    if(Math.abs(endX-startX) < 10) return;
    const xAxis = chart.scales.x;
    const startIdx = Math.max(0, Math.round(xAxis.getValueForPixel(Math.min(startX,endX))));
    const endIdx = Math.min(chart.data.labels.length-1, Math.round(xAxis.getValueForPixel(Math.max(startX,endX))));
    const startDate = chart.data.labels[startIdx];
    const endDate = chart.data.labels[endIdx];
    const results = activeAssets.map(ticker => {
      const ds = chart.data.datasets.find(d=>d.label===ticker);
      if(!ds) return null;
      const startVal = ds.data[startIdx], endVal = ds.data[endIdx];
      if(startVal==null||endVal==null) return null;
      return { ticker, change: parseFloat((endVal-startVal).toFixed(2)), color: ASSET_COLORS[ticker]||"#fff" };
    }).filter(Boolean).sort((a,b)=>b.change-a.change);
    setRangeResult({ startDate, endDate, results });
  }, [activeAssets]);

  const toggleAsset = useCallback(ticker => {
    setActiveAssets(prev => prev.includes(ticker) ? prev.filter(t=>t!==ticker) : [...prev,ticker]);
  }, []);

  // ── Correlation matrix ─────────────────────────────────────────────────────
  const corrData = useMemo_(() => {
    if(!hasData || activeAssets.length < 2) return null;
    const windowDays = WINDOW_DAYS[window_];
    const matrix = {};
    activeAssets.forEach(a => {
      matrix[a] = {};
      activeAssets.forEach(b => {
        if(a===b) { matrix[a][b]=1.00; return; }
        const pa = priceData[a], pb = priceData[b];
        if(!pa||!pb) { matrix[a][b]=null; return; }
        const na = pa.slice(pa.length-windowDays), nb = pb.slice(pb.length-windowDays);
        matrix[a][b] = pearsonCorr(na,nb);
      });
    });
    return matrix;
  }, [hasData, activeAssets, window_, priceData]);

  if(fetching) return (
    <div className="chart-fetch-status">
      <div className="chart-fetch-title">Fetching Historical Data...</div>
      <div className="chart-fetch-sub">This is a one-time fetch of up to 20 years of daily price data.<br/>~8 minutes on free tier. Do not close this tab.</div>
      <div style={{maxWidth:480,margin:"0 auto"}}>
        <div className="progress-track"><div className="progress-fill" style={{width:fetchProgress+"%"}}/></div>
        <div style={{marginTop:16}}>
          {fetchLog.map((l,i)=><div key={i} className="progress-item">
            <div className="progress-dot" style={{background:i===fetchLog.length-1?"var(--accent)":"var(--green)",animation:i===fetchLog.length-1?"pulse 1s infinite":"none"}}/>
            <span style={{color:i===fetchLog.length-1?"var(--text)":"var(--text3)",fontSize:12}}>{l}</span>
          </div>)}
        </div>
      </div>
    </div>
  );

  if(!hasData) return (
    <div className="chart-fetch-status">
      <div className="chart-fetch-title">📈 Comparative Performance Chart</div>
      <div className="chart-fetch-sub">
        This tab shows up to 20 years of price history across all assets.<br/>
        Price data lives in <strong>prices.json</strong> in your GitHub repo — updated automatically every Sunday.<br/><br/>
        {pricesDate
          ? <span style={{color:"var(--green)"}}>✓ prices.json loaded — latest data: {pricesDate}</span>
          : <span style={{color:"var(--yellow)"}}>⚠ prices.json not found — add it to your GitHub repo root, or fetch below to generate it.</span>
        }
      </div>
      <button className="btn-generate" onClick={fetchAll}>Fetch & Download prices.json</button>
      <div style={{marginTop:14,fontSize:11,color:"var(--text3)"}}>After downloading, add prices.json to your GitHub repo root. GitHub Action will update it weekly from then on.</div>
    </div>
  );

  return (
    <div className="chart-tab">
      {/* Main chart card */}
      <div className="chart-main-wrap">
        {/* Toolbar */}
        <div className="chart-toolbar">
          <div className="chart-toolbar-group">
            <span className="chart-toolbar-label">Window</span>
            {WINDOWS.map(w=><button key={w} className={`chart-tb-btn ${window_===w?"active":""}`} onClick={()=>setWindow_(w)}>{w}</button>)}
          </div>
          <div className="chart-separator"/>
          <div className="chart-toolbar-group">
            <span className="chart-toolbar-label">Mode</span>
            <button className={`chart-tb-btn ${mode==="abs"?"active":""}`} onClick={()=>setMode("abs")}>Absolute %</button>
            <button className={`chart-tb-btn mode-rel ${mode==="rel"?"active":""}`} onClick={()=>setMode("rel")}>vs SPY</button>
          </div>
          <div className="chart-separator"/>
          <div className="chart-toolbar-group">
            <span className="chart-toolbar-label">Events</span>
            <button className={`chart-tb-btn ${events==="off"?"active":""}`} onClick={()=>setEvents("off")}>Off</button>
            <button className={`chart-tb-btn ${events==="major"?"active":""}`} onClick={()=>setEvents("major")}>Major</button>
            <button className={`chart-tb-btn ${events==="all"?"active":""}`} onClick={()=>setEvents("all")}>All</button>
          </div>
          {bakeReady && (
            <>
              <div className="chart-separator"/>
              <button className="chart-tb-btn active"
                onClick={()=>onBakeData(priceData,true)}
                style={{background:"var(--green)",borderColor:"var(--green)",color:"#000"}}>
                ⬇ Download prices.json
              </button>
            </>
          )}
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:12}}>
          <div style={{fontSize:11,color:"var(--text3)"}}>Click and drag to measure % change between any two dates. Lines shift red when an asset enters its own bear market.</div>
          <div style={{display:"flex",gap:12,alignItems:"center",fontSize:11}}>
            <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:12,height:12,borderRadius:2,background:"rgba(63,185,80,0.15)",display:"inline-block",border:"1px solid rgba(63,185,80,0.3)"}}/>SPY Bull</span>
            <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:12,height:12,borderRadius:2,background:"rgba(248,81,73,0.12)",display:"inline-block",border:"1px solid rgba(248,81,73,0.3)"}}/>SPY Bear</span>
            <span style={{display:"flex",alignItems:"center",gap:5,color:"var(--text3)"}}>★ = AI event</span>
            {aiEvents.length>0&&<span style={{color:"var(--accent)",fontWeight:600}}>{aiEvents.length} major event{aiEvents.length!==1?"s":""} logged</span>}
          </div>
        </div>
        <div className="chart-canvas-wrap" onMouseDown={handleMouseDown} onMouseUp={handleMouseUp}>
          <canvas ref={chartRef}/>
        </div>
      </div>

      {/* Range result sidebar */}
      {rangeResult && (
        <div className="range-sidebar">
          <div className="range-title">📊 Range Analysis: {rangeResult.startDate} → {rangeResult.endDate}</div>
          {rangeResult.results.map((r,i)=>(
            <div key={i} className="range-row">
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:r.color,flexShrink:0}}/>
                <span className="range-ticker">{r.ticker}</span>
              </div>
              <span style={{fontFamily:"var(--font-mono)",fontWeight:700,color:r.change>0?"var(--green)":r.change<0?"var(--red)":"var(--text2)"}}>
                {r.change>0?"+":""}{r.change}%
              </span>
            </div>
          ))}
        </div>
      )}

      {/* Events Panel */}
      {events !== "off" && visibleEventsForPanel.length > 0 && (
        <div className="card">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div className="card-title" style={{margin:0}}>Market Events in View ({visibleEventsForPanel.length})</div>
            <div style={{fontSize:11,color:"var(--text3)"}}>Vertical lines on chart correspond to each event below</div>
          </div>
          <div style={{maxHeight:300,overflowY:"auto",display:"flex",flexDirection:"column",gap:0}}>
            {visibleEventsForPanel.map((ev,i)=>(
              <div key={i} style={{display:"flex",gap:12,padding:"10px 0",borderBottom:"1px solid var(--border)",alignItems:"flex-start"}}>
                <div style={{width:3,borderRadius:2,background:ev.color,flexShrink:0,alignSelf:"stretch",minHeight:20}}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:3,flexWrap:"wrap"}}>
                    <span style={{fontWeight:700,fontSize:12,color:ev.color}}>{ev.label}</span>
                    <span style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-mono)"}}>{ev.date}</span>
                    {ev.tier&&<span style={{fontSize:10,background:"rgba(0,217,255,.1)",color:"var(--accent)",padding:"1px 6px",borderRadius:3}}>AI</span>}
                  </div>
                  {ev.detail&&<div style={{fontSize:12,color:"var(--text2)",lineHeight:1.6,marginBottom:4}}>{ev.detail}</div>}
                  {!ev.detail&&EVENT_DESCRIPTIONS[ev.label]&&<div style={{fontSize:12,color:"var(--text2)",lineHeight:1.6,marginBottom:4}}>{EVENT_DESCRIPTIONS[ev.label]}</div>}
                  {ev.source&&<div style={{fontSize:11}}>
                    <span style={{color:"var(--text3)"}}>Source: </span>
                    {ev.sourceUrl
                      ? <a href={ev.sourceUrl} target="_blank" rel="noopener noreferrer" style={{color:"var(--accent)",textDecoration:"none"}}>{ev.source} ↗</a>
                      : <span style={{color:"var(--text2)"}}>{ev.source}</span>}
                  </div>}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Asset toggles */}
      <div className="asset-toggles">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div className="card-title" style={{margin:0}}>Assets</div>
          <div style={{display:"flex",gap:6}}>
            <button className="chart-tb-btn" onClick={()=>setActiveAssets(["SPY"])}>Reset</button>
            <button className="chart-tb-btn" onClick={()=>setActiveAssets(ALL_ASSETS.flatMap(g=>g.tickers))}>All On</button>
          </div>
        </div>
        {ALL_ASSETS.map(group=>(
          <div key={group.group} className="asset-group">
            <div className="asset-group-title">{group.group}</div>
            <div className="asset-chips">
              {group.tickers.map(t=>{
                const on = activeAssets.includes(t);
                const col = ASSET_COLORS[t]||"#fff";
                const isInd = INDICATORS.includes(t);
                const label = t==="VIX"?"VIX (Fear)":t==="UMCSENT"?"Consumer Sent.":t;
                return (
                  <button key={t} className={`asset-chip ${on?"":"off"}`}
                    style={on?{background:col+"22",borderColor:col,color:col}:{}}
                    title={`${TICKER_NAMES[t]||t}${isInd?" — right axis, raw value":"" }`}
                    onClick={()=>toggleAsset(t)}>
                    <div className="asset-chip-dot" style={{background:on?col:"var(--border2)"}}/>
                    {label}{isInd?" ⊳":""}
                  </button>
                );
              })}
            </div>
          </div>
        ))}
      </div>

      {/* Correlation matrix */}
      {corrData && activeAssets.length >= 2 && (
        <div className="corr-matrix">
          <div className="card-title">Correlation Matrix — {window_} window</div>
          <div style={{fontSize:11,color:"var(--text3)",marginBottom:12}}>
            Pearson correlation vs SPY. Green = moves together, Red = moves opposite. Useful for diversification.
          </div>
          <table className="corr-table">
            <thead>
              <tr><th></th>{activeAssets.map(t=><th key={t}>{t}</th>)}</tr>
            </thead>
            <tbody>
              {activeAssets.map(a=>(
                <tr key={a}>
                  <th style={{textAlign:"left",paddingLeft:8,color:"var(--text2)"}}>{a}</th>
                  {activeAssets.map(b=>{
                    const v = corrData[a]?.[b];
                    return <td key={b} style={{background:corrColor(v),color:"var(--text)"}}>{v===1?"—":v!==null?v.toFixed(2):"N/A"}</td>;
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* AI Events Sources Panel */}
      {aiEvents.length > 0 && (
        <div className="card">
          <div className="card-title">★ AI-Detected Market Events — Sources</div>
          <div style={{fontSize:12,color:"var(--text3)",marginBottom:12}}>
            Events automatically identified during weekly report generation. Only structural, chart-worthy events are logged.
          </div>
          {aiEvents.map((ev,i) => (
            <div key={i} style={{display:"flex",gap:12,padding:"12px 0",borderBottom:"1px solid var(--border)",alignItems:"flex-start"}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:ev.color,flexShrink:0,marginTop:4}}/>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontWeight:700,fontSize:13,color:"var(--text)"}}>{ev.label}</span>
                  <span style={{fontSize:11,color:"var(--text3)",fontFamily:"var(--font-mono)"}}>{ev.date}</span>
                </div>
                {ev.detail && <div style={{fontSize:12,color:"var(--text2)",lineHeight:1.65,marginBottom:6}}>{ev.detail}</div>}
                {ev.source && (
                  <div style={{fontSize:11,display:"flex",alignItems:"center",gap:6}}>
                    <span style={{color:"var(--text3)"}}>Source:</span>
                    {ev.sourceUrl
                      ? <a href={ev.sourceUrl} target="_blank" rel="noopener noreferrer" style={{color:"var(--accent)",textDecoration:"none"}}>{ev.source} ↗</a>
                      : <span style={{color:"var(--text2)"}}>{ev.source}</span>
                    }
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// useMemo polyfill name collision fix
function useMemo_(fn, deps) { return React.useMemo(fn, deps); }





// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState("overview");
  const [hardcodedPrices, setHardcodedPrices] = useState(null);
  const [pricesLoading, setPricesLoading] = useState(true);
  const [pricesError, setPricesError] = useState(null);
  const [pricesDate, setPricesDate] = useState(null);

  // Load prices.json on mount
  useEffect(() => {
    fetch("prices.json?v="+Date.now())
      .then(r => {
        if(!r.ok) throw new Error("prices.json not found (HTTP "+r.status+")");
        return r.json();
      })
      .then(data => {
        setHardcodedPrices(data);
        const dates = data._dates;
        if(dates && dates.length > 0) setPricesDate(dates[dates.length-1]);
        setPricesLoading(false);
      })
      .catch(e => {
        setPricesError(e.message);
        setPricesLoading(false);
      });
  }, []);

  const handleBakeData = useCallback((priceData, download=false) => {
    // No longer baking into HTML — data lives in prices.json
    setHardcodedPrices(priceData);
    if(download) {
      // Download prices.json separately
      const blob = new Blob([JSON.stringify(priceData, null, 2)], {type:"application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "prices.json";
      a.click();
    }
  }, []);


  const [theme, setTheme] = useState(()=>localStorage.getItem("mkt_theme")||"dark");
  const toggleTheme = useCallback(()=>{
    setTheme(t=>{
      const next = t==="dark"?"light":"dark";
      localStorage.setItem("mkt_theme", next);
      document.documentElement.classList.toggle("light", next==="light");
      return next;
    });
  },[]);
  useEffect(()=>{
    document.documentElement.classList.toggle("light", theme==="light");
  },[theme]);
  const [chartNeedsUpdate, setChartNeedsUpdate] = useState(false);
  const [aborting, setAborting] = useState(false);
  const abortRef = React.useRef(false);
  const [aiEvents, setAiEvents] = useState(()=>store.get(AI_EVENTS_KEY)||[]);
  // No longer needed — GitHub Action handles price updates in prices.json
  const extendChartData = useCallback((weeklyPerfData) => {
    setChartNeedsUpdate(false); // prices.json is source of truth now
  }, []);

  const [settings,setSettings]=useState(loadSettings);
  const [cache,setCache]=useState(loadCache);
  const [history,setHistory]=useState(loadHistory);
  const [generating,setGenerating]=useState(false);
  const [prog,setProg]=useState({step:0,total:0,current:"",log:[]});
  const [sectorSort,setSectorSort]=useState("default"); // "default" | "sentiment" | "performance"

  const handleAbort = useCallback(() => {
    abortRef.current = true;
    setAborting(true);
  }, []);

  const saveSettingsHandler = useCallback(s=>{setSettings(s);store.set(SETTINGS_KEY,s);},[]);
  const clearCache = useCallback(()=>{store.del(CACHE_KEY);setCache(null);},[]);
  const clearHistory = useCallback(()=>{if(!confirm("Clear all historical data?"))return;store.del(HISTORY_KEY);setHistory([]);},[]);

  const generate = useCallback(async()=>{
    if(!settings.gmKey){alert("Enter your Groq API key in Settings first.");setTab("settings");return;}
    setGenerating(true);
    setAborting(false);
    abortRef.current = false;
    let step=0;
    const total = 2+ALL_TICKERS.length+SECTORS.length+1;
    const tick = msg=>{step++;setProg(p=>({step,total,current:msg,log:[...p.log.slice(-6),msg]}));};

    try {
      const partial = store.get(PARTIAL_KEY)||{};
      let macro = partial.macro||null;
      if(!macro){ tick("Analyzing macro environment..."); macro=await analyzeMacro(settings.gmKey); store.set(PARTIAL_KEY,{...partial,macro}); }
      else { tick("Macro loaded from cache..."); }

      // Derive performance from baked chart prices — no API calls needed
      let perfData = {};
      if(hardcodedPrices && hardcodedPrices._dates && hardcodedPrices._dates.length > 0) {
        tick("Computing ETF performance from baked price data...");
        perfData = derivePerfFromBaked(hardcodedPrices);
        const count = Object.keys(perfData).length;
        tick(`✓ Computed performance for ${count} tickers from baked data`);
      } else {
        // No baked data yet — fetch from proxy
        const partial = store.get(PARTIAL_KEY)||{};
        perfData = partial.perfData||{};
        const remaining = ALL_TICKERS.filter(t=>!perfData[t]);
        let fetchedCount = Object.keys(perfData).length;
        for(let i=0;i<remaining.length;i++){
          const t=remaining[i];
          fetchedCount++;
          tick(`Fetching ${t} (${fetchedCount}/${ALL_TICKERS.length})...`);
          try {
            perfData[t]=await fetchTicker(t,settings.avKey,msg=>tick(msg));
            store.set(PARTIAL_KEY,{...store.get(PARTIAL_KEY)||{},perfData});
          } catch(e) {
            console.warn(t,e.message);
            tick(`⚠ ${t}: ${e.message}`);
          }
          if(abortRef.current) { tick("⛔ Aborted by user."); break; }
          if(i<remaining.length-1) await new Promise(r=>setTimeout(r,800));
        }
      }



      const analysis={};
      for(let i=0;i<SECTORS.length;i++){
        if(abortRef.current) { tick("⛔ Aborted by user."); break; }
        const s=SECTORS[i];
        tick(`Analyzing ${s.name} (${i+1}/${SECTORS.length})...`);
        try { analysis[s.id]=await analyzeSector(settings.gmKey,s,perfData,msg=>tick(msg)); }
        catch(e) { console.warn(s.id,e.message); analysis[s.id]={score:0,momentum:"flat",pulse:"Analysis unavailable.",subindustry:"",earnings:"No data",georisk:null,topMovers:[],outlook:""}; }
        if(i<SECTORS.length-1) await new Promise(r=>setTimeout(r,7000));
      }

      tick("Analyzing commodities...");
      const commAnalysis=await analyzeComm(settings.gmKey,perfData,msg=>tick(msg));

      const newCache={perfData,analysis,macro,commAnalysis,goldSpot:perfData["GLD"]?.price??null,oilSpot:perfData["USO"]?.price??null,timestamp:Date.now()};
      setCache(newCache);store.set(CACHE_KEY,newCache);store.del(PARTIAL_KEY);

      const sectorScores={},perfSnapshots={};
      SECTORS.forEach(s=>{sectorScores[s.id]=analysis[s.id]?.score??0;perfSnapshots[s.id]=perfData[s.id]??null;});
      const newHistory=[...history,{timestamp:Date.now(),sectorScores,perfSnapshots}];
      setHistory(newHistory);store.set(HISTORY_KEY,newHistory.slice(-20));

      // Generate AI events for this week
      tick("Identifying market events this week...");
      let newAiEvents = [];
      try {
        newAiEvents = await analyzeWeeklyEvents(settings.gmKey, macro, msg=>tick(msg));
        if(newAiEvents.length > 0) {
          const existing = store.get(AI_EVENTS_KEY)||[];
          // Deduplicate by date+label
          const merged = [...existing];
          newAiEvents.forEach(ev => {
            if(!merged.find(e=>e.date===ev.date&&e.label===ev.label)) merged.push(ev);
          });
          store.set(AI_EVENTS_KEY, merged);
          setAiEvents(merged);
        }
      } catch(e) { console.warn("Event generation failed:", e.message); }

      // Extend chart data with this week's prices
      extendChartData(perfData);

    } catch(err){alert("Error: "+err.message);}
    setGenerating(false);setAborting(false);abortRef.current=false;setProg({step:0,total:0,current:"",log:[]});setTab("overview");
  },[settings,history]);

  const hasKeys=!!(settings.gmKey);
  const hasData=!!cache;

  // Sorted sectors
  const sortedSectors = useCallback(()=>{
    if(!cache||sectorSort==="default") return SECTORS;
    if(sectorSort==="sentiment") return [...SECTORS].sort((a,b)=>(cache.analysis?.[b.id]?.score??0)-(cache.analysis?.[a.id]?.score??0));
    if(sectorSort==="performance") return [...SECTORS].sort((a,b)=>(cache.perfData?.[b.id]?.w1??-999)-(cache.perfData?.[a.id]?.w1??-999));
    return SECTORS;
  },[cache,sectorSort]);

  return (
    <div className="app">
      {/* Header */}
      <div className="header">
        <div className="header-logo">Market Intelligence</div>
        <div className="header-status">
          <div className="status-dot" style={{background:hasData?"var(--green)":"var(--red)"}}/>
          {hasData?`Updated ${new Date(cache.timestamp).toLocaleDateString()}`:"No data"}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={toggleTheme} style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:6,padding:"4px 10px",cursor:"pointer",fontSize:13,color:"var(--text2)"}}>
            {theme==="dark"?"☀️ Light":"🌙 Dark"}
          </button>
          <div className="header-meta">{new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div>
        </div>
      </div>

      {/* Tabs */}
      <div className="tabs">
        {[["overview","① Overview"],["sectors","② Sectors"],["commodities","③ Commodities"],["chart","⑥ Chart"],["history","⑤ History"],["settings","⑦ Settings"]].map(([id,label])=>(
          <button key={id} className={`tab ${tab===id?"active":""}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {/* Progress */}
      {generating&&(
        <div className="progress-wrap">
          <div className="progress-title">Generating Report</div>
          <div className="progress-sub">Fetching market data + AI analysis. ~8–10 min on free tier. Keep this tab open.</div>
          <div className="progress-track"><div className="progress-fill" style={{width:`${prog.total?(prog.step/prog.total)*100:0}%`}}/></div>
          <div className="progress-ticker">{prog.current} — {prog.step}/{prog.total}</div>
          <div style={{marginTop:16,marginBottom:8}}>
            <button className="btn btn-danger" onClick={handleAbort} disabled={aborting}
              style={{fontSize:12,padding:"6px 20px"}}>
              {aborting ? "⛔ Aborting..." : "⛔ Abort Report"}
            </button>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:6}}>
              Aborting will stop fetching but save progress so far
            </div>
          </div>
          <div className="progress-log">
            {prog.log.map((l,i)=>(
              <div key={i} className="progress-item">
                <div className="progress-dot" style={{background:i===prog.log.length-1?"var(--accent)":"var(--green)",animation:i===prog.log.length-1?"pulse 1s infinite":"none"}}/>
                <span style={{color:i===prog.log.length-1?"var(--text)":"var(--text3)"}}>{l}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {!generating&&(
        <div className="main">

          {/* ── OVERVIEW ── */}
          {tab==="overview"&&(
            <div className="gap-20">
              {!hasData&&(
                <div className="welcome">
                  <div className="welcome-title">Market Intelligence</div>
                  <div className="welcome-sub">Weekly sector analysis · AI-powered · All 11 GICS sectors</div>
                  <div className="welcome-features">
                    {[["📊","ETF Performance","1W/1M/3M/6M/1Y derived from baked price data — no API needed"],["🤖","AI Analysis","Deep sector analysis, earnings, geo-risk via Groq"],["🌍","Full Coverage","11 sectors · 4 benchmarks · 4 global · 5 commodities"],["📈","History","Tracks sentiment week-over-week automatically"],["⚠️","Risk Flags","Geo-risks, earnings watch & sector rotation signals"],["🆓","100% Free","Alpha Vantage + Groq free tiers — no credit card"]].map(([i,t,d])=>(
                      <div key={t} className="welcome-feat"><div className="welcome-feat-icon">{i}</div><div className="welcome-feat-title">{t}</div><div className="welcome-feat-desc">{d}</div></div>
                    ))}
                  </div>
                  <button className="btn-generate" onClick={hasKeys?generate:()=>setTab("settings")}>
                    {hasKeys?"Generate Report":"Enter API Keys First →"}
                  </button>
                  {!hasKeys&&<div style={{marginTop:14,fontSize:12,color:"var(--text3)"}}>Go to ⑦ Settings and enter your Groq API key</div>}
                  {hasKeys&&store.get(PARTIAL_KEY)&&(
                    <div style={{marginTop:18,fontSize:12,color:"var(--yellow)",background:"rgba(227,179,65,.08)",border:"1px solid rgba(227,179,65,.2)",borderRadius:6,padding:"10px 20px",display:"inline-block"}}>
                      ⚡ Partial progress saved — clicking Generate will resume from where it stopped
                    </div>
                  )}
                </div>
              )}

              {hasData&&<>
                {/* Macro */}
                {cache.macro&&(
                  <div className="card">
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                      <div className="card-title" style={{margin:0}}>Macro Pulse</div>
                      <span style={{fontSize:12,padding:"4px 12px",borderRadius:5,fontWeight:700,
                        background:cache.macro.overallTone==="Risk-On"?"rgba(63,185,80,.15)":cache.macro.overallTone==="Risk-Off"?"rgba(248,81,73,.15)":"rgba(227,179,65,.15)",
                        color:cache.macro.overallTone==="Risk-On"?"var(--green)":cache.macro.overallTone==="Risk-Off"?"var(--red)":"var(--yellow)"
                      }}>{cache.macro.overallTone}</span>
                    </div>
                    <div className="macro-grid">
                      <div className="macro-card"><div className="macro-label">CPI Inflation</div><div className="macro-value">{cache.macro.cpi}</div><div className="macro-note">{cache.macro.cpiNote}</div></div>
                      <div className="macro-card"><div className="macro-label">Fed Funds Rate</div><div className="macro-value">{cache.macro.rates}</div><div className="macro-note">{cache.macro.ratesNote}</div></div>
                      <div className="macro-card"><div className="macro-label">GDP Growth</div><div className="macro-value">{cache.macro.gdp}</div><div className="macro-note">{cache.macro.gdpNote}</div></div>
                    </div>
                    {cache.macro.macroSummary&&<div style={{marginTop:14,fontSize:13,color:"var(--text2)",lineHeight:1.75,padding:"14px 16px",background:"var(--bg3)",borderRadius:6,borderLeft:"3px solid var(--accent)"}}>{cache.macro.macroSummary}</div>}
                  </div>
                )}

                {/* Benchmarks */}
                <div className="card"><div className="card-title">US Benchmarks</div><div className="grid-4">{BENCHMARKS.map(b=><BenchCard key={b.id} item={b} data={cache.perfData}/>)}</div></div>
                <div className="card"><div className="card-title">Global Markets</div><div className="grid-4">{GLOBAL.map(g=><BenchCard key={g.id} item={g} data={cache.perfData}/>)}</div></div>

                {/* Heatmap */}
                <div className="card"><div className="card-title">Sector Sentiment Heat Map</div><Heatmap sectors={SECTORS} analysis={cache.analysis}/></div>

                {/* Rotation */}
                <div className="card"><div className="card-title">Sector Rotation Signal</div><RotationSignal sectors={SECTORS} analysis={cache.analysis}/></div>

                <div style={{textAlign:"center",paddingBottom:8}}>
                  <button className="btn btn-ghost" onClick={generate}>↺ Refresh Report</button>
                  <div style={{fontSize:11,color:"var(--text3)",marginTop:8}}>
                    Price data auto-updates every Sunday via GitHub Action. Run the action manually anytime from GitHub → Actions tab.
                  </div>
                </div>

                {/* Price data status */}
                {pricesLoading && (
                  <div style={{background:"rgba(0,217,255,.06)",border:"1px solid rgba(0,217,255,.2)",borderRadius:8,padding:"12px 16px",fontSize:12,color:"var(--text2)"}}>
                    ⏳ Loading price data from prices.json...
                  </div>
                )}
                {pricesError && (
                  <div style={{background:"rgba(248,81,73,.08)",border:"1px solid rgba(248,81,73,.25)",borderRadius:8,padding:"12px 16px",fontSize:12,color:"var(--red)"}}>
                    ⚠ Could not load prices.json: {pricesError}. Make sure prices.json is in your repo root.
                  </div>
                )}
                {!pricesLoading && !pricesError && pricesDate && (
                  <div style={{background:"rgba(63,185,80,.06)",border:"1px solid rgba(63,185,80,.2)",borderRadius:8,padding:"12px 16px",fontSize:12,color:"var(--text2)",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:"var(--green)"}}>✓</span> Price data loaded — latest date: <strong style={{color:"var(--text)"}}>{pricesDate}</strong>. Updated weekly via GitHub Action.
                  </div>
                )}
              </>}
            </div>
          )}

          {/* ── SECTORS ── */}
          {tab==="sectors"&&(
            <div className="gap-20">
              {!hasData?<div className="empty">Generate a report first.</div>:<>
                <div className="sort-bar">
                  <span className="sort-label">Sort by:</span>
                  {[["default","Default"],["sentiment","Sentiment ↕"],["performance","1W Perf ↕"]].map(([v,l])=>(
                    <button key={v} className={`sort-btn ${sectorSort===v?"active":""}`} onClick={()=>setSectorSort(v)}>{l}</button>
                  ))}
                </div>
                <div className="grid-2">
                  {sortedSectors().map(s=><SectorCard key={s.id} sector={s} perf={cache.perfData} analysis={cache.analysis}/>)}
                </div>
              </>}
            </div>
          )}

          {/* ── COMMODITIES ── */}
          {tab==="commodities"&&(
            <div className="gap-20">
              {!hasData?<div className="empty">Generate a report first.</div>:<>
                <div className="card">
                  <div className="card-title">Commodities Overview</div>
                  {cache.commAnalysis?.commoditySummary&&<div style={{fontSize:13,color:"var(--text2)",lineHeight:1.75,marginBottom:18,padding:"14px 16px",background:"var(--bg3)",borderRadius:6,borderLeft:"3px solid var(--yellow)"}}>{cache.commAnalysis.commoditySummary}</div>}
                  <div className="grid-3">
                    {[
                      {name:"🥇 Gold",etf:"GLD",spotLabel:"GLD PRICE",spot:cache.goldSpot?`$${cache.goldSpot.toFixed(2)}`:"N/A",note:cache.commAnalysis?.goldNote},
                      {name:"🛢️ WTI Oil",etf:"USO",spotLabel:"USO PRICE",spot:cache.oilSpot?`$${cache.oilSpot.toFixed(2)}`:"N/A",note:cache.commAnalysis?.oilNote},
                      {name:"🥈 Silver",etf:"SLV",note:cache.commAnalysis?.silverNote},
                      {name:"🔶 Copper",etf:"COPA",sub:"Economic leading indicator",note:cache.commAnalysis?.copperNote},
                      {name:"📦 Broad Commodities",etf:"DJP"},
                    ].map(c=>(
                      <div key={c.etf} className="comm-card">
                        <div className="comm-name">{c.name}</div>
                        {c.spotLabel&&<><div className="comm-spot-label">{c.spotLabel}</div><div className="comm-spot">{c.spot}</div></>}
                        {c.sub&&<div style={{fontSize:11,color:"var(--text3)",marginBottom:8}}>{c.sub}</div>}
                        <div style={{margin:"10px 0"}}>
                          {[["1W",cache.perfData?.[c.etf]?.w1],["1M",cache.perfData?.[c.etf]?.m1],["3M",cache.perfData?.[c.etf]?.m3],["6M",cache.perfData?.[c.etf]?.m6],["1Y",cache.perfData?.[c.etf]?.y1]].map(([p,v])=>(
                            <div key={p} className="bench-perf-row">
                              <span className="bench-perf-label">{c.etf} {p}</span>
                              <span className={`perf ${pc(v)}`} style={{fontSize:11}}>{fp(v)}</span>
                            </div>
                          ))}
                        </div>
                        {c.note&&<div style={{marginTop:10,fontSize:12,color:"var(--text2)",lineHeight:1.65,borderTop:"1px solid var(--border)",paddingTop:10}}>{c.note}</div>}
                      </div>
                    ))}
                  </div>
                </div>
              </>}
            </div>
          )}


          {/* ── CHART ── */}
          {tab==="chart"&&<ChartTab settings={settings} hardcodedPrices={hardcodedPrices} onBakeData={handleBakeData} chartNeedsUpdate={chartNeedsUpdate} onDownload={()=>{handleBakeData(hardcodedPrices,true);setChartNeedsUpdate(false);}} aiEvents={aiEvents} pricesDate={pricesDate}/>}

          {/* ── HISTORY ── */}
          {tab==="history"&&<HistoryTab history={history}/>}

          {/* ── SETTINGS ── */}
          {tab==="settings"&&<SettingsTab settings={settings} onSave={saveSettingsHandler} onClearCache={clearCache} onClearHistory={clearHistory} cacheInfo={cache?.timestamp}/>}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
(function() {
  var bar = document.getElementById('init-bar');
  function setProgress(p) { if(bar) bar.style.width = p + '%'; }

  // Poll until all CDN deps are ready before starting Babel
  function waitForDeps(cb, attempts) {
    attempts = attempts || 0;
    if(attempts > 300) { // 30s timeout
      var missing = [];
      if(!window.React) missing.push('React');
      if(!window.ReactDOM) missing.push('ReactDOM');
      if(!window.Chart) missing.push('Chart.js');
      if(!window.Babel) missing.push('Babel');
      window.onerror('Failed to load: ' + missing.join(', ') + '. Try refreshing the page.', 'deps', 0);
      return;
    }
    if(window.React && window.ReactDOM && window.Chart && window.Babel) {
      cb();
    } else {
      setProgress(Math.min(40, attempts / 3));
      setTimeout(function() { waitForDeps(cb, attempts + 1); }, 100);
    }
  }

  waitForDeps(function() {
    setProgress(50);
    var src = document.getElementById('app-source').textContent;
    setTimeout(function() {
      try {
        var compiled = Babel.transform(src, { presets: ['react'] }).code;
        setProgress(80);
        setTimeout(function() {
          try {
            var script = document.createElement('script');
            script.textContent = compiled;
            document.body.appendChild(script);
            setProgress(100);
          } catch(e) { window.onerror(e.message, 'eval', 0); }
        }, 10);
      } catch(e) { window.onerror('Babel: ' + e.message, 'transform', 0); }
    }, 50);
  });
})();
</script>

</body>
